      PhaseGroupCount:
        range: float
      PhaseSetId:
        range: string
      PhaseSetCount:
        range: float
      SplitLinks:
        range: string
      FacingLinks:
        range: string
      SvType:
        range: string
      SvLength:
        range: float
      InsertedBases:
        range: string
      OverlapBases:
        range: string
      SecondaryLinks:
        range: string
      JunctionSequence:
        range: string
      RefBaseSequence:
        range: string
      InsertType:
        range: string
      RefBaseCandidates:
        range: float
      UnmappedCandidates:
        range: float
      AssemblyInfo:
        range: string

  TidyAssembleassembly:
    description: Breakend assemblies.
    in_subset: [tidy, latest]
