id: https://example.org/tidywigits/esvee
name: esvee
description: >-
  Structural variant caller optimised for short read sequencing.

prefixes:
  linkml: https://w3id.org/linkml/
  esvee: https://example.org/tidywigits/esvee/

imports:
  - linkml:types

default_range: string
default_prefix: esvee

subsets:
  raw:
    description: Raw input file schema
  tidy:
    description: Tidy output schema
  latest:
    description: Esvee latest version

classes:

  #---- Prepfraglen ----#
  RawPrepfraglen:
    description: Fragment length stats.
    in_subset: [raw, latest]
    annotations:
      name: prepfraglen
      pattern: "\\.esvee\\.prep\\.fragment_length\\.tsv$"
      ftype: tsv
    attributes:
      FragmentLength:
        range: float
      Count:
        range: float

  TidyPrepfraglen:
    description: Fragment length stats.
    in_subset: [tidy, latest]
    annotations:
      name: prepfraglen
      subtbl: tbl1
    attributes:
      fragment_length:
        range: float
      count:
        range: float


  #---- Prepdiscstats ----#
  RawPrepdiscstats:
    description: Discordant read stats.
    in_subset: [raw, latest]
    annotations:
      name: prepdiscstats
      pattern: "\\.esvee\\.prep\\.disc_stats\\.tsv$"
      ftype: tsv
    attributes:
      TotalReads:
        range: float
      PrepReads:
        range: float
      Translocation:
        range: float
      InvLt1K:
        range: float
      Inv1To5K:
        range: float
      Inv5To100K:
        range: float
      InvGt100K:
        range: float
      Del1To5K:
        range: float
      Del5To100K:
        range: float
      DelGt100K:
        range: float
      Dup1To5K:
        range: float
      Dup5To100K:
        range: float
      DupGt100K:
        range: float

  TidyPrepdiscstats:
    description: Discordant read stats.
    in_subset: [tidy, latest]
    annotations:
      name: prepdiscstats
      subtbl: tbl1
    attributes:
      tot_reads:
        range: float
        description: Total reads
      prep_reads:
        range: float
        description: Prep reads written
      translocation:
        range: float
        description: Translocation
      inv_lt_1k:
        range: float
        description: Inversion < 1kb
      inv_1_to_5k:
        range: float
        description: Inversion 1-5kb
      inv_5_to_100k:
        range: float
        description: Inversion 5-100kb
      inv_gt_100k:
        range: float
        description: Inversion > 100kb
      del_1_to_5k:
        range: float
        description: Deletion 1-5kb
      del_5_to_100k:
        range: float
        description: Deletion 5-100kb
      del_gt_100k:
        range: float
        description: Deletion > 100kb
      dup_1_to_5k:
        range: float
        description: Duplication 1-5kb
      dup_5_to_100k:
        range: float
        description: Duplication 5-100kb
      dup_gt_100k:
        range: float
        description: Duplication > 100kb


  #---- Prepjunction ----#
  RawPrepjunction:
    description: Candidate junctions.
    in_subset: [raw, latest]
    annotations:
      name: prepjunction
      pattern: "\\.esvee\\.prep\\.junction\\.tsv$"
      ftype: tsv
    attributes:
      Chromosome:
        range: string
      Position:
        range: float
      Orientation:
        range: float
      JunctionFrags:
        range: float
      ExactSupportFrags:
        range: float
      OtherSupportFrags:
        range: float
      LowMapQualFrags:
        range: float
      MaxQual:
        range: float
      ExtraInfo:
        range: float
      Indel:
        range: string
      Hotspot:
        range: string
      InitialReadId:
        range: string

  TidyPrepjunction:
    description: Candidate junctions.
    in_subset: [tidy, latest]
    annotations:
      name: prepjunction
      subtbl: tbl1
    attributes:
      chrom:
        range: string
      position:
        range: float
      orientation:
        range: float
      junc_frags:
        range: float
      exact_support_frags:
        range: float
      other_support_frags:
        range: float
      low_map_qual_frags:
        range: float
      max_qual:
        range: float
      extra_info:
        range: float
      indel:
        range: string
      hotspot:
        range: string
      initial_read_id:
        range: string


  #---- Assemblephased ----#
  RawAssemblephased:
    description: Phased assemblies.
    in_subset: [raw, latest]
    annotations:
      name: assemblephased
      pattern: "\\.esvee\\.phased_assembly\\.tsv$"
      ftype: tsv
    attributes:
      AssemblyIds:
        range: string
      AssemblyInfo:
        range: string
      Merged:
        range: string
      SequenceLength:
        range: float
      AssemblyCigar:
        range: string
      FullSequence:
        range: string

  TidyAssemblephased:
    description: Phased assemblies.
