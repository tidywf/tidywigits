        range: float

  TidySummaryTbl1:
    description: Coverage summary - main metrics.
    in_subset: [tidy, latest]
    annotations:
      name: summary
      subtbl: tbl1
    attributes:
      tot_region_bases:
        range: float
        description: Total region bases
      tot_reads:
        range: float
        description: Total reads
      dup_reads:
        range: float
        description: Duplicate reads
      dual_strand_reads:
        range: float
        description: Dual strand reads
      cov_mean:
        range: float
        description: Mean coverage
      cov_sd:
        range: float
        description: Standard deviation of coverage
      cov_median:
        range: float
        description: Median coverage
      cov_mad:
        range: float
        description: Median absolute deviation of coverage
      lowmapq_pct:
        range: float
        description: Low mapping quality percentage
      dup_pct:
        range: float
        description: Duplicate percentage
      unpaired_pct:
        range: float
        description: Unpaired percentage
      lowbaseq_pct:
        range: float
        description: Low base quality percentage
      overlap_read_pct:
        range: float
        description: Overlapping read percentage
      cov_capped:
        range: float
        description: Coverage capped

  TidySummaryCovx:
    description: Coverage summary - depth coverage.
    in_subset: [tidy, latest]
    annotations:
      name: summary
      subtbl: tbl2
    attributes:
