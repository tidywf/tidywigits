id: https://example.org/tidywigits/bamtools
name: bamtools
description: >-
  Various routines to run on a BAM file.

prefixes:
  linkml: https://w3id.org/linkml/
  bamtools: https://example.org/tidywigits/bamtools/

imports:
  - linkml:types

default_range: string
default_prefix: bamtools

subsets:
  raw:
    description: Raw input file schema
  tidy:
    description: Tidy output schema
  latest:
    description: Bamtools latest version

classes:

  #----Wgsmetrics----#
  RawWgsmetrics:
    description: Mostly coverage metrics.
    in_subset: [raw, latest]
    annotations:
      name: wgsmetrics
      pattern: "\\.wgsmetrics$"
      ftype: txt
    attributes:
      GENOME_TERRITORY:
        range: float
      MEAN_COVERAGE:
        range: float
      SD_COVERAGE:
        range: float
      MEDIAN_COVERAGE:
        range: float
      MAD_COVERAGE:
        range: float
      PCT_EXC_ADAPTER:
        range: float
      PCT_EXC_MAPQ:
        range: float
      PCT_EXC_DUPE:
        range: float
      PCT_EXC_UNPAIRED:
        range: float
      PCT_EXC_BASEQ:
        range: float
      PCT_EXC_OVERLAP:
        range: float
      PCT_EXC_CAPPED:
        range: float
      PCT_EXC_TOTAL:
        range: float
      PCT_1X:
        range: float
      PCT_5X:
        range: float
      PCT_10X:
        range: float
      PCT_15X:
        range: float
      PCT_20X:
        range: float
      PCT_25X:
        range: float
      PCT_30X:
        range: float
      PCT_40X:
        range: float
      PCT_50X:
        range: float
      PCT_60X:
        range: float
      PCT_70X:
        range: float
      PCT_80X:
        range: float
      PCT_90X:
        range: float
      PCT_100X:
        range: float

  TidyWgsmetrics:
    description: Mostly coverage metrics.
    in_subset: [tidy, latest]
    annotations:
      name: wgsmetrics
      subtbl: tbl1
    attributes:
      genome_territory:
        range: integer
        description: Genome territory
      mean_coverage:
        range: float
        description: Mean coverage
      sd_coverage:
        range: float
        description: Standard deviation of coverage
      median_coverage:
        range: float
        description: Median coverage
      mad_coverage:
        range: float
        description: Median absolute deviation of coverage
      pct_exc_adapter:
        range: float
        description: Fraction of bases excluded due to adapter
      pct_exc_mapq:
        range: float
        description: Fraction of bases excluded due to mapping quality
      pct_exc_dupe:
        range: float
        description: Fraction of bases excluded due to duplication
      pct_exc_unpaired:
        range: float
        description: Fraction of bases excluded due to being unpaired
      pct_exc_baseq:
        range: float
        description: Fraction of bases excluded due to base quality
      pct_exc_overlap:
        range: float
        description: Fraction of bases excluded due to overlap
      pct_exc_capped:
        range: float
        description: Fraction of bases excluded due to capping
      pct_exc_total:
        range: float
        description: Total fraction of bases excluded
      pct_1x:
        range: float
        description: Fraction of genome at 1x coverage
      pct_5x:
        range: float
        description: Fraction of genome at 5x coverage
      pct_10x:
        range: float
        description: Fraction of genome at 10x coverage
      pct_15x:
        range: float
        description: Fraction of genome at 15x coverage
      pct_20x:
        range: float
        description: Fraction of genome at 20x coverage
      pct_25x:
        range: float
        description: Fraction of genome at 25x coverage
      pct_30x:
        range: float
        description: Fraction of genome at 30x coverage
      pct_40x:
        range: float
        description: Fraction of genome at 40x coverage
      pct_50x:
        range: float
        description: Fraction of genome at 50x coverage
      pct_60x:
        range: float
        description: Fraction of genome at 60x coverage
      pct_70x:
        range: float
        description: Fraction of genome at 70x coverage
      pct_80x:
        range: float
        description: Fraction of genome at 80x coverage
      pct_90x:
        range: float
        description: Fraction of genome at 90x coverage
      pct_100x:
        range: float
        description: Fraction of genome at 100x coverage

  #----Coverage----#
  RawCoverage:
    description: Coverage metrics.
    in_subset: [raw, latest]
    annotations:
      name: coverage
      pattern: "\\.bam_metric\\.coverage\\.tsv$"
      ftype: tsv
    attributes:
      Coverage:
        range: float
      Count:
        range: float

  TidyCoverage:
    description: Coverage metrics.
    in_subset: [tidy, latest]
    annotations:
      name: coverage
      subtbl: tbl1
    attributes:
      coverage:
        range: float
        description: Coverage
      count:
        range: float
        description: Count

  #----Flagstats----#
  RawFlagstats:
    description: Counts of alignments for each FLAG type.
    in_subset: [raw, latest]
    annotations:
      name: flagstats
      pattern: "\\.bam_metric\\.flag_counts\\.tsv$"
      ftype: txt
    attributes:
      dummy:
        range: string

  TidyFlagstats:
    description: Counts of alignments for each FLAG type.
    in_subset: [tidy, latest]
    annotations:
      name: flagstats
      subtbl: tbl1
    attributes:
      passed_or_failed:
        range: string
        description: QC passed or failed
      total:
        range: float
        description: Total number of reads that are QC pass and fail
      primary:
        range: float
        description: Neither secondary nor supplementary
      secondary:
        range: float
        description: Secondary
      suppl:
        range: float
        description: Supplementary
      dup:
        range: float
        description: Dup
      primary_dup:
        range: float
        description: Dup and neither secondary nor supplementary
      mapped:
        range: float
        description: Not unmap
      primary_map:
        range: float
        description: Not unmap, not secondary, and not supplementary
      paired_in_seq:
        range: float
        description: Paired
      read1:
        range: float
        description: Both paired and read1
      read2:
        range: float
        description: Both paired and read2
      proper_pair:
        range: float
        description: Both paired and proper_pair, not unmap
      both_map:
        range: float
        description: Paired and neither unmap nor munmap
      singletons:
        range: float
        description: Both paired and munmap, and not unmap
      matemap_diff:
        range: float
        description: Paired and neither unmap nor munmap, and mrnm not equal to rname
      matemap_diff_mapq5:
        range: float
        description: Paired and neither unmap nor munmap, and mrnm not equal to rname, and mapq >= 5
      mapped_pct:
        range: float
        description: Percentage of total reads mapped
      primary_map_pct:
        range: float
        description: Percentage of total primary reads
      proper_pair_pct:
        range: float
        description: Percentage against total pairs
      singletons_pct:
        range: float
        description: Percentage against total pairs

  #----Fraglength----#
  RawFraglength:
    description: Fragment lengths.
    in_subset: [raw, latest]
    annotations:
      name: fraglength
      pattern: "\\.bam_metric\\.frag_length\\.tsv$"
      ftype: tsv
    attributes:
      FragmentLength:
        range: string
      Count:
        range: float

  TidyFraglength:
    description: Fragment length counts.
    in_subset: [tidy, latest]
    annotations:
      name: fraglength
      subtbl: tbl1
    attributes:
      length:
        range: string
        description: Fragment length
      count:
        range: float
        description: Count

  #----Partitionstats----#
  RawPartitionstats:
    description: Partition stats.
    in_subset: [raw, latest]
    annotations:
      name: partitionstats
      pattern: "\\.bam_metric\\.partition_stats\\.tsv$"
      ftype: tsv
    attributes:
      Chromosome:
        range: string
      PositionStart:
        range: float
      PositionEnd:
        range: float
      TotalReads:
        range: float
      DuplicateReads:
        range: float
      ChimericReads:
        range: float
      InterPartition:
        range: float
      UnmappedReads:
        range: float
      ProcessTime:
        range: float

  TidyPartitionstats:
    description: Partition stats.
    in_subset: [tidy, latest]
    annotations:
      name: partitionstats
      subtbl: tbl1
    attributes:
      chrom:
        range: string
        description: Chromosome
      pos_start:
        range: float
        description: Start position
      pos_end:
        range: float
        description: End position
      total_reads:
        range: float
        description: Total reads
      dup_reads:
        range: float
        description: Duplicate reads
      chim_reads:
        range: float
        description: Chimeric reads
      interpartition:
        range: float
        description: Inter-partition reads
      unmap_reads:
        range: float
        description: Unmapped reads
      process_time:
        range: float
        description: Process time


  #----Summary----#
  RawSummary:
    description: Coverage summary.
    in_subset: [raw, latest]
    annotations:
      name: summary
      pattern: "\\.bam_metric\\.summary\\.tsv$"
