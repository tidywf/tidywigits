name: conda-docker-docs

on:
  push:
    branches:
      - main
      - dev

jobs:
  condarise_and_tag:
    if: "startsWith(github.event.head_commit.message, 'Bump version:')"
    name: Condarise and Tag
    uses: tidywf/.github/.github/workflows/condarise-and-tag.yaml@main
    with:
      pkg_name: tidywigits
      pkg_version: '0.0.7.9000' # bump
    secrets: inherit

  dockerise:
    name: Dockerise
    needs: [condarise_and_tag]
    uses: tidywf/.github/.github/workflows/dockerise.yaml@main
    with:
      pkg_version: '0.0.7.9000' # bump

  pkgdownise:
    name: Pkgdownise
    needs: [condarise_and_tag]
    uses: tidywf/.github/.github/workflows/pkgdownise.yaml@main
    with:
      pkg_name: tidywigits
      pkg_version: '0.0.7.9000' # bump
      dvc: true
      mermaid: true
    secrets: inherit
