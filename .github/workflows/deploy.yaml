name: conda-docker-docs

on:
  push:
    branches:
      - main
      - dev
env:
  pkg_name: tidywigits
  anaconda_token: ${{ secrets.ANACONDA_UPLOAD_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto
  AWS_REGION: auto
  conda_recipe: deploy/conda/recipe
  conda_env_yaml: deploy/conda/env/yaml
  conda_env_lock: deploy/conda/env/lock
  VERSION: '0.0.7' # bump

jobs:
  condarise-dockerise:
    if: "startsWith(github.event.head_commit.message, 'Bump version:')"
    name: Conda Docker Deployment
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      contents: write # for lockfiles
      packages: write # for docker

    steps:
      - name: 🚚 Code checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }} # for overriding branch protection rules
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: ${{ env.conda_env_yaml }}/condabuild.yaml
          activate-environment: condabuild_env
          miniforge-version: latest
      - name: 🐍 Conda pkg build
        run: |
          EXTRA_CHANNEL=""
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && EXTRA_CHANNEL="--channel umccr/label/dev"
          rattler-build build \
            ${EXTRA_CHANNEL} \
            --channel umccr \
            --channel conda-forge \
            --recipe ${conda_recipe}/recipe.yaml \
            --output-dir ${RUNNER_TEMP}/out1
      - name: 🐍 Conda pkg upload
        run: |
          pkg_path=$(find ${RUNNER_TEMP}/out1 -type f -name "*.conda")
          LABEL_ARG=""
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && LABEL_ARG="--channel dev"
          rattler-build upload anaconda \
            --owner umccr \
            --api-key ${anaconda_token} \
            ${LABEL_ARG} \
            ${pkg_path}
      - name: 🔒 Conda lock
        run: |
          CHANNEL_ARGS="--channel umccr --channel conda-forge"
          [[ "${{ github.ref }}" == "refs/heads/dev" ]] && CHANNEL_ARGS="--channel umccr/label/dev ${CHANNEL_ARGS}"
          conda-lock lock \
            --file ${conda_env_yaml}/${pkg_name}.yaml \
            ${CHANNEL_ARGS} \
            -p linux-64
          conda-lock render \
            -p linux-64 \
            conda-lock.yml \
          && rm conda-lock.yml \
          && mv conda-linux-64.lock ${conda_env_lock}/
      - name: 💾 Commit lockfiles
        run: |
          git status
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          MSG="[bot] Updating conda-lock files (v${VERSION})"
          git add .
          git commit -m "${MSG}"
          git push
      - name: 📥 Pull lock commit
        id: pull_lock_commit
        run: |
          git pull --no-rebase
          git --no-pager log --decorate=short --pretty=oneline -n3
          LATEST_COMMIT_HASH="$(git --no-pager log -1 --format='%H')"
          echo "latest_commit_hash=${LATEST_COMMIT_HASH}" >> $GITHUB_OUTPUT
      - name: 🔖 Create tag
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v8
        env:
          LATEST_COMMIT_HASH: ${{ steps.pull_lock_commit.outputs.latest_commit_hash }}
        with:
          script: |
            const the_tag_name = 'refs/tags/v' + process.env.VERSION
            const the_sha = process.env.LATEST_COMMIT_HASH
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: the_tag_name,
              sha: the_sha
            })
      - name: 🚚 Code checkout (release tag)
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          ref: v${{ env.VERSION }}
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }} # for overriding branch protection rules
      - name: 🏰 QEMU setup
        uses: docker/setup-qemu-action@v3
      - name: 🏯 Buildx setup
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          buildkitd-config-inline: |
            [worker.oci]
              max-parallelism = 2
      - name: 🐙 GitHub CR login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: 🐳 Docker img build and push
        uses: docker/build-push-action@v6
        with:
          tags: ghcr.io/${{ github.repository }}:${{ env.VERSION }}
          context: .
          push: true
          platforms: linux/amd64

  pkgdown:
    name: pkgdown
    needs: [condarise-dockerise]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      contents: write # for committing
    steps:
      - name: 🚚 Code checkout (release)
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          ref: v${{ env.VERSION }}
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }} # for overriding branch protection rules
      - name: 🚚 Code checkout (dev)
        if: github.ref == 'refs/heads/dev'
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.BOT_DEPLOY_KEY }} # for overriding branch protection rules
      - name: DVC setup
        uses: iterative/setup-dvc@v2
      - name: DVC pull
        run: |
          dvc pull
          ls -l inst/extdata/*
      - name: 👾 Miniforge setup
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          environment-file: ${{ env.conda_env_yaml }}/pkgdown.yaml
          activate-environment: pkgdown_env
          miniforge-version: latest
      - name: 📦 Install R pkg from source
        run: R CMD INSTALL --no-test-load .
      - name: 🖼️ Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: 🎨 Generate schema ER SVGs
        run: |
          echo '{"args":["--no-sandbox"]}' > /tmp/puppeteer.json
          Rscript inst/scripts/gen_er_svgs.R /tmp/puppeteer.json

      - name: 🌐 Website publish
        run: |
          Rscript -e "list.files(system.file('extdata', package = 'tidywigits'), recursive = TRUE)"
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          Rscript -e "pkgdown::deploy_to_branch(pkg = '.', new_process = FALSE)"
